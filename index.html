<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>충남고 민원접수</title>
  
  <style>
    :root { --blue: #0b3190; --gray: #f5f5f7; }
    body { font-family: -apple-system, sans-serif; background: var(--gray); display:flex; justify-content:center; padding:40px 20px; margin:0; }
    
    .card { background:#fff; padding:30px; border-radius:24px; width:100%; max-width:440px; box-shadow:0 8px 30px rgba(0,0,0,0.08); box-sizing:border-box; }
    .header { text-align:center; margin-bottom:20px; border-bottom: 2px solid var(--gray); padding-bottom: 10px; }
    
    /* 로그인 섹션 */
    #login-section { text-align: center; padding: 20px 0; }
    .auth-msg { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5; }

    /* 접수 폼 섹션 (처음엔 숨김) */
    #form-section { display: none; }
    
    .user-badge { background: #eef2ff; color: var(--blue); padding: 10px; border-radius: 12px; font-size: 13px; font-weight: bold; margin-bottom: 20px; text-align: center; border: 1px solid #d0d7f7; }

    label { font-size:14px; font-weight:600; color:#86868b; display:block; margin-top:15px; margin-bottom:5px; }
    input, select, textarea { width:100%; padding:14px; border-radius:12px; border:1px solid #d2d2d7; box-sizing:border-box; background:#f9f9f9; font-size:16px; outline:none; font-family: inherit; }
    
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    
    .submit { width:100%; padding:18px; border-radius:16px; border:none; background:var(--blue); color:#fff; font-weight:bold; font-size:17px; cursor:pointer; margin-top:25px; }

    @media (max-width: 480px) {
      body { padding: 20px 15px; }
      .card { padding: 25px 20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h2 style="color:var(--blue); margin:0;">정보부 민원 접수</h2>
      <p style="font-size:12px; color:#86868b; margin-top:5px;">충남고등학교 정보보안부</p>
    </div>

    <div id="login-section">
      <p class="auth-msg">장난 접수 방지 및 정확한 답변 전달을 위해<br><b>구글 계정 로그인</b>이 필요합니다.</p>
      
      <div id="g_id_onload"
           data-client_id="461701933207-l7r5rb5iiuedj2bfabj9v73ceuc3rqm0.apps.googleusercontent.com"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left" data-width="280"></div>
    </div>

    <div id="form-section">
      <div id="user-info" class="user-badge"></div>
      
      <label>학번 선택</label>
      <div class="row">
        <select id="g"><option value="">학년</option><option>1</option><option>2</option><option>3</option></select>
        <select id="c"><option value="">반</option></select>
        <select id="n"><option value="">번호</option></select>
      </div>
      
      <label>이름</label>
      <input type="text" id="name" placeholder="성명">
      
      <label>문의 유형</label>
      <select id="type">
        <option>비밀번호 초기화</option>
        <option>기기 문의</option>
        <option>기타</option>
      </select>
      
      <label>상세 내용</label>
      <textarea id="detail" rows="4" placeholder="문의 내용을 상세히 입력해주세요."></textarea>
      
      <button class="submit" id="s-btn" onclick="send()">접수하기</button>
    </div>
  </div>

  <script>
    // 🔥 [필수 수정 2] 방금 새로 배포한 웹 앱(GAS) 주소를 넣으세요 (따옴표 유지!)
    const API = "https://script.google.com/macros/s/AKfycbxSRclPfYEfIfpg6srFLS6Nn8Qw3D5vHHWngzR9LDqJJxODiTqQv4LU9CLblqiJZ3O7/exec";
    let authenticatedEmail = ""; 

    // 학급 및 번호 옵션 자동 생성
    const cs = document.getElementById('c'), ns = document.getElementById('n');
    for(let i=1; i<=12; i++) cs.add(new Option(i+'반', i));
    for(let i=1; i<=35; i++) ns.add(new Option(i+'번', String(i).padStart(2,'0')));

    // 구글 로그인 성공 콜백 함수
    function handleCredentialResponse(response) {
        // JWT 토큰 해독하여 이메일 추출
        const base64Url = response.credential.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        
        const payloadObj = JSON.parse(jsonPayload);
        authenticatedEmail = payloadObj.email;

        // 로그인 창 숨기고 폼 보여주기
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('form-section').style.display = 'block';
        document.getElementById('user-info').innerText = `✔️ 인증된 계정: ${authenticatedEmail}`;
    }

    // 서버로 데이터 전송
    async function send() {
      const g = document.getElementById('g').value;
      const c = document.getElementById('c').value;
      const n = document.getElementById('n').value;
      const name = document.getElementById('name').value;
      const type = document.getElementById('type').value;
      const det = document.getElementById('detail').value;
      
      if(!g || !c || !n || !name || !det) { 
          alert("모든 항목을 입력해주세요."); 
          return; 
      }
      
      const btn = document.getElementById('s-btn'); 
      btn.disabled = true; 
      btn.innerText = "접수 중...";
      
      try {
          await fetch(API, {
              method: "POST", 
              mode: "no-cors", 
              body: JSON.stringify({
                  studentId: g + String(c).padStart(2,'0') + n, 
                  name: name, 
                  authEmail: authenticatedEmail, // 구글 인증 이메일 전송 (D열로 들어감)
                  type: type, 
                  detail: det
              })
          });
          alert("접수가 완료되었습니다!"); 
          location.reload();
      } catch (error) {
          alert("접수 중 오류가 발생했습니다. 다시 시도해주세요.");
          btn.disabled = false;
          btn.innerText = "접수하기";
      }
    }
  </script>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
