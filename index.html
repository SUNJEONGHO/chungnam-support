<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>충남고 정보부 민원접수</title>
  <style>
    :root { --main-blue: #0b3190; --bg-gray: #f5f5f7; }
    body { font-family:-apple-system, sans-serif; background: var(--bg-gray); display:flex; justify-content:center; padding:40px 20px; margin:0; }
    .card { background:#fff; padding:30px; border-radius:24px; width:100%; max-width:420px; box-shadow:0 8px 30px rgba(0,0,0,0.08); box-sizing:border-box; }
    
    .logo-container { text-align:center; margin-bottom:20px; }
    h2 { margin:10px 0; font-size:24px; color:#1d1d1f; }
    
    label { font-size:13px; font-weight:600; color:#86868b; margin-left:5px; display:block; margin-top:18px; margin-bottom:5px; }
    input, select, textarea { width:100%; padding:14px; border-radius:12px; border:1px solid #d2d2d7; box-sizing:border-box; background:#f9f9f9; font-size:16px; outline:none; transition:0.2s; }
    input:focus, textarea:focus { border-color:var(--main-blue); background:#fff; box-shadow: 0 0 0 4px rgba(11, 49, 144, 0.1); }

    /* ✅ 이메일 도메인 버튼 스타일 */
    .email-container { display:flex; flex-direction:column; gap:10px; }
    .domain-group { display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:5px; }
    .domain-btn { 
      background:#fff; border:1px solid #d2d2d7; padding:10px; border-radius:10px; 
      font-size:13px; cursor:pointer; transition:0.2s; color:#1d1d1f; font-weight:500;
    }
    .domain-btn:hover { background:#f5f5f7; border-color:#86868b; }
    .domain-btn.active { background:var(--main-blue); color:#fff; border-color:var(--main-blue); }

    .btn-submit { width:100%; padding:18px; border-radius:16px; border:none; background:var(--main-blue); color:#fff; font-weight:600; font-size:17px; cursor:pointer; transition: 0.2s; margin-top:30px; }
    .btn-submit:hover { opacity:0.9; transform:translateY(-1px); }
    .btn-submit:disabled { background:#d2d2d7; cursor:not-allowed; transform:none; }
  </style>
</head>
<body>
  <div class="card" id="form-view">
    <div class="logo-container">
      <svg width="60" viewBox="250 550 375 415"><path d="M936.955 587.936c-40.91 0-74.057 33.195-74.057 74.083 0 40.899 33.147 74.062 74.057 74.062 40.889 0 74.064-33.163 74.064-74.062 0-40.899-31.947-74.083-74.064-74.083m406.058 342.002c-.037 24.414-19.923 40.652-39.861 40.631-59.053-.06-163.436.053-245.287-.073-46.957-.06-74.071-37.963-74.071-74.061 0-27.226-.068-37.532-.068-37.532h-93.849s.046 21.991.046 37.532c0 36.088-28.396 73.858-73.979 74.001-82.087.257-197.095.092-245.924-.051-22.16-.063-39.467-18.752-39.467-40.447 0-88.718.071-309.319.071-309.319 112.87 28.443 221.721-6.344 236.769-36.565-51.573-37.083 10.333-76.007 83.231-75.978 76.53.03 138.214 44.022 169.547 108.661 10.724 22.093 102.977 67.785 236.481 36.565 0 0 .143 239.515.03 309.319" fill="#0b3190" transform="matrix(0.4605 0 0 -0.4605 -244.318 632.055)"/></svg>
      <h2>민원 접수</h2>
    </div>
    
    <label>학번</label>
    <input type="text" id="sid" placeholder="예: 20101">
    
    <label>이름</label>
    <input type="text" id="name" placeholder="성명을 입력하세요">
    
    <div class="email-container">
      <label>이메일 아이디</label>
      <input type="text" id="email-id" placeholder="아이디만 입력 (예: hong)">
      <div class="domain-group">
        <button type="button" class="domain-btn" onclick="setDomain('@chungnamhs.djsch.kr', this)">@충남고</button>
        <button type="button" class="domain-btn" onclick="setDomain('@gmail.com', this)">@gmail.com</button>
        <button type="button" class="domain-btn" onclick="setDomain('@naver.com', this)">@naver.com</button>
        <button type="button" class="domain-btn" onclick="setDomain('@kakao.com', this)">@kakao.com</button>
      </div>
    </div>
    
    <label>문의 유형</label>
    <select id="type">
      <option>비밀번호 초기화</option>
      <option>기기 문의</option>
      <option>기타</option>
    </select>
    
    <label>상세 내용</label>
    <textarea id="detail" placeholder="도움이 필요한 내용을 구체적으로 적어주세요."></textarea>
    
    <button class="btn-submit" id="submit-btn" onclick="submit()">접수하기</button>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycby_ZD4x4EIGEmEQA0pQVqMCpdIEjaiFlGDZXsmykVRfbYrGsgbYVT3qf1J7KMEsF6oh/exec";
    let selectedDomain = "";

    // ✅ 도메인 버튼 선택 함수
    function setDomain(domain, btn) {
      selectedDomain = domain;
      // 모든 버튼 활성화 해제 후 클릭한 버튼만 활성화
      document.querySelectorAll('.domain-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    async function submit() {
      const btn = document.getElementById('submit-btn');
      const sid = document.getElementById('sid').value;
      const name = document.getElementById('name').value;
      const emailId = document.getElementById('email-id').value;
      const detail = document.getElementById('detail').value;

      if(!sid || !name || !emailId || !selectedDomain || !detail) { 
        alert("이메일 도메인 버튼을 포함해 모든 항목을 입력해 주세요."); 
        return; 
      }

      btn.disabled = true;
      btn.innerText = "접수 중...";

      // 이메일 아이디와 선택한 도메인을 합침
      const fullEmail = emailId.includes('@') ? emailId : emailId + selectedDomain;
      const data = { 
        studentId: sid, 
        name: name, 
        email: fullEmail, 
        type: document.getElementById('type').value, 
        detail: detail 
      };
      
      try {
        await fetch(API, { method:"POST", mode:"no-cors", body:JSON.stringify(data) });
        alert("접수가 완료되었습니다!");
        location.reload();
      } catch (e) {
        alert("오류가 발생했습니다. 다시 시도해 주세요.");
        btn.disabled = false;
        btn.innerText = "접수하기";
      }
    }
  </script>
</body>
</html>
