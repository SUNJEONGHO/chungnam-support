<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>충남고 민원접수</title>
  <style>
    :root { --blue: #0b3190; --gray: #f5f5f7; }
    
    /* 기본 폰트를 모바일에서 가장 예쁘게 보이는 시스템 폰트로 설정 */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--gray); display:flex; justify-content:center; padding:40px 20px; margin:0; }
    
    .card { background:#fff; padding:30px; border-radius:24px; width:100%; max-width:440px; box-shadow:0 8px 30px rgba(0,0,0,0.08); box-sizing:border-box; }
    .header { text-align:center; margin-bottom:20px; border-bottom: 2px solid var(--gray); padding-bottom: 10px; }
    label { font-size:14px; font-weight:600; color:#86868b; display:block; margin-top:15px; margin-bottom:5px; }
    
    /* 🔥 [수정됨] font-size: 16px (iOS Safari 자동 확대 방지) & 기본 스타일 제거 */
    input, select, textarea { width:100%; padding:14px; border-radius:12px; border:1px solid #d2d2d7; box-sizing:border-box; background:#f9f9f9; font-size:16px; outline:none; -webkit-appearance: none; font-family: inherit; }
    textarea { resize: vertical; } /* 모바일에서 가로로 늘어나는 것 방지 */

    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    
    .domain-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    /* 🔥 [수정됨] 버튼 터치 영역 및 글자 크기 확대 */
    .d-btn { background:#fff; border:1px solid #d2d2d7; padding:12px 10px; border-radius:10px; font-size:14px; font-weight:500; cursor:pointer; transition: 0.2s; }
    .d-btn.active { background: var(--blue); color:#fff; border-color: var(--blue); font-weight:bold; }
    
    .submit { width:100%; padding:18px; border-radius:16px; border:none; background:var(--blue); color:#fff; font-weight:bold; font-size:17px; cursor:pointer; margin-top:25px; transition: 0.2s; }

    /* ==========================================
       🔥 스마트폰 화면 전용 디자인 (가로폭 480px 이하)
       ========================================== */
    @media (max-width: 480px) {
      body { padding: 20px 15px; } /* 화면 낭비를 줄이고 카드를 키움 */
      .card { padding: 25px 20px; border-radius: 20px; } 
      
      .domain-btns { gap: 6px; }
      .d-btn { padding: 12px 5px; font-size: 13px; } /* 작은 폰에서도 터치하기 좋게 조절 */
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h2 style="color:var(--blue); margin:0;">정보부 민원 접수</h2>
      <p style="font-size:12px; color:#86868b; margin-top:5px;">충남고등학교 정보보안부</p>
    </div>
    
    <label>학번 선택</label>
    <div class="row">
      <select id="g"><option value="">학년</option><option>1</option><option>2</option><option>3</option></select>
      <select id="c"><option value="">반</option></select>
      <select id="n"><option value="">번호</option></select>
    </div>
    
    <label>이름</label>
    <input type="text" id="name" placeholder="성명">
    
    <label>이메일 아이디</label>
    <input type="text" id="eid" placeholder="아이디 입력 (예: gildong)">
    
    <div class="domain-btns">
      <button class="d-btn" onclick="toggleD('@chungnamhs.djsch.kr', this)">@충남고</button>
      <button class="d-btn" onclick="toggleD('@gmail.com', this)">@gmail.com</button>
      <button class="d-btn" onclick="toggleD('@naver.com', this)">@naver.com</button>
      <button class="d-btn" onclick="toggleD('@kakao.com', this)">@kakao.com</button>
    </div>
    
    <label>문의 유형</label>
    <select id="type">
      <option>비밀번호 초기화</option>
      <option>기기 문의</option>
      <option>기타</option>
    </select>
    
    <label>상세 내용</label>
    <textarea id="detail" rows="3" placeholder="어떤 문제가 있는지 자세히 적어주세요."></textarea>
    
    <button class="submit" id="s-btn" onclick="send()">접수하기</button>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbzT2JkFWLlbxZg_k3uiKkywzkfP_h0Q5Dc2YEhZ4FJeBiTGL058NzM6dDFUmXZWyS_9/exec";
    
    // 학급 및 번호 동적 생성 (1~12반, 1~35번)
    const cs = document.getElementById('c'), ns = document.getElementById('n');
    for(let i=1; i<=12; i++) cs.add(new Option(i+'반', i));
    for(let i=1; i<=35; i++) ns.add(new Option(i+'번', String(i).padStart(2,'0')));

    // 도메인 버튼 토글 로직
    let selD = "";
    function toggleD(d, b) {
      if(selD === d) { 
          selD = ""; 
          b.classList.remove('active'); 
      } else { 
          selD = d; 
          document.querySelectorAll('.d-btn').forEach(btn => btn.classList.remove('active')); 
          b.classList.add('active'); 
      }
    }

    // 데이터 전송 로직
    async function send() {
      const g = document.getElementById('g').value;
      const c = document.getElementById('c').value;
      const n = document.getElementById('n').value;
      const name = document.getElementById('name').value;
      const eid = document.getElementById('eid').value;
      const det = document.getElementById('detail').value;
      
      // 필수 입력값 검증
      if(!g || !c || !n || !name || !eid || !selD || !det) { 
          alert("모든 항목을 빠짐없이 입력해주세요."); 
          return; 
      }
      
      const btn = document.getElementById('s-btn'); 
      btn.disabled = true; 
      btn.innerText = "접수 중...";
      
      try {
          await fetch(API, {
              method: "POST", 
              mode: "no-cors", 
              body: JSON.stringify({
                  studentId: g + String(c).padStart(2,'0') + n, 
                  name: name, 
                  email: eid + selD, 
                  type: document.getElementById('type').value, 
                  detail: det
              })
          });
          alert("접수가 완료되었습니다! 선생님께서 확인 후 이메일로 답변을 보내드립니다."); 
          location.reload(); // 성공 시 새로고침
      } catch (error) {
          alert("접수 중 오류가 발생했습니다. 인터넷 연결을 확인해주세요.");
          btn.disabled = false;
          btn.innerText = "접수하기";
      }
    }
  </script>
</body>
</html>
