<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>충남고 민원접수</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root { --blue: #0b3190; --gray: #f5f5f7; }
    body { font-family: -apple-system, sans-serif; background: var(--gray); display:flex; justify-content:center; padding:40px 20px; margin:0; }
    .card { background:#fff; padding:30px; border-radius:24px; width:100%; max-width:440px; box-shadow:0 8px 30px rgba(0,0,0,0.08); box-sizing:border-box; }
    .header { text-align:center; margin-bottom:20px; border-bottom: 2px solid var(--gray); padding-bottom: 10px; }
    #login-section { text-align: center; padding: 20px 0; }
    #form-section { display: none; }
    .user-badge { background: #eef2ff; color: var(--blue); padding: 10px; border-radius: 12px; font-size: 13px; font-weight: bold; margin-bottom: 20px; text-align: center; border: 1px solid #d0d7f7; }
    label { font-size:14px; font-weight:600; color:#86868b; display:block; margin-top:15px; margin-bottom:5px; }
    input, select, textarea { width:100%; padding:14px; border-radius:12px; border:1px solid #d2d2d7; box-sizing:border-box; background:#f9f9f9; font-size:16px; outline:none; font-family: inherit; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    .submit { width:100%; padding:18px; border-radius:16px; border:none; background:var(--blue); color:#fff; font-weight:bold; font-size:17px; cursor:pointer; margin-top:25px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h2 style="color:var(--blue); margin:0;">정보부 민원 접수</h2>
      <p style="font-size:12px; color:#86868b; margin-top:5px;">충남고등학교 정보보안부</p>
    </div>

    <div id="login-section">
      <p style="font-size:14px; color:#666; margin-bottom:20px;">구글 계정 로그인이 필요합니다.</p>
      <div id="g_id_onload" data-client_id="461701933207-l7r5rb5iiuedj2bfabj9v73ceuc3rqm0.apps.googleusercontent.com" data-callback="handleCredentialResponse461701933207-l7r5rb5iiuedj2bfabj9v73ceuc3rqm0.apps.googleusercontent.com"></div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="form-section">
      <div id="user-info" class="user-badge"></div>
      <label>학번 선택</label>
      <div class="row">
        <select id="g"><option value="">학년</option><option>1</option><option>2</option><option>3</option></select>
        <select id="c"><option value="">반</option></select>
        <select id="n"><option value="">번호</option></select>
      </div>
      <label>이름</label>
      <input type="text" id="name" placeholder="성명">
      <label>문의 유형</label>
      <select id="type">
        <option>비밀번호 초기화</option>
        <option>기기 문의</option>
        <option>기타</option>
      </select>
      <label>상세 내용</label>
      <textarea id="detail" rows="4" placeholder="내용 입력"></textarea>
      <button class="submit" id="s-btn" onclick="send()">접수하기</button>
    </div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbzEMnSdgPcTzeslJsG7MaC8kQatw9trJE_9WNBQ9i9sEu4GQTQzK-XAw19B8slBqM-1/exec";
    let authEmail = "";

    const cs = document.getElementById('c'), ns = document.getElementById('n');
    for(let i=1; i<=12; i++) cs.add(new Option(i+'반', i));
    for(let i=1; i<=35; i++) ns.add(new Option(i+'번', String(i).padStart(2,'0')));

    function handleCredentialResponse(response) {
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      authEmail = payload.email;
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('form-section').style.display = 'block';
      document.getElementById('user-info').innerText = `인증됨: ${authEmail}`;
    }

    async function send() {
      const g=document.getElementById('g').value, c=document.getElementById('c').value, n=document.getElementById('n').value;
      const name=document.getElementById('name').value, det=document.getElementById('detail').value, type=document.getElementById('type').value;
      if(!g||!c||!n||!name||!det) return alert("항목을 채워주세요.");
      
      const btn = document.getElementById('s-btn'); btn.disabled=true; btn.innerText="접수 중...";
      await fetch(API, {method:"POST", mode:"no-cors", body:JSON.stringify({studentId:g+String(c).padStart(2,'0')+n, name, authEmail, type, detail:det})});
      alert("접수 완료!"); location.reload();
    }
  </script>
</body>
</html>
