<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>충남고 민원접수</title>
  <style>
    :root { --blue: #0b3190; --gray: #f5f5f7; }
    body { font-family: -apple-system, sans-serif; background: var(--gray); display:flex; justify-content:center; padding:20px; margin:0; }
    .card { background:#fff; padding:30px; border-radius:24px; width:100%; max-width:440px; box-shadow:0 8px 30px rgba(0,0,0,0.08); box-sizing:border-box; }
    #form-section { display: none; }
    .user-badge { background: #eef2ff; color: var(--blue); padding: 12px; border-radius: 12px; font-size: 13px; font-weight: bold; margin-bottom: 20px; text-align: center; border: 1px solid #d0d7f7; }
    label { font-size:14px; font-weight:600; color:#86868b; display:block; margin-top:15px; margin-bottom:5px; }
    input, select, textarea { width:100%; padding:14px; border-radius:12px; border:1px solid #d2d2d7; box-sizing:border-box; background:#f9f9f9; font-size:16px; outline:none; }
    
    /* 🔥 학번 선택 그룹 스타일 */
    .sid-group { display: flex; gap: 10px; }
    .sid-group select { flex: 1; text-align: center; text-align-last: center; appearance: none; padding-right: 0; }
    
    .submit { width:100%; padding:18px; border-radius:16px; border:none; background:var(--blue); color:#fff; font-weight:bold; font-size:17px; cursor:pointer; margin-top:25px; }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="color:var(--blue); text-align:center; margin-top:0;">정보부 민원 접수</h2>
    
    <div id="login-section" style="text-align:center;">
      <p style="color:#666; font-size:14px; margin-bottom:20px;">학생 인증을 위해 구글 로그인이 필요합니다.</p>
      <div id="g_id_onload" data-client_id="461701933207-l7r5rb5iiuedj2bfabj9v73ceuc3rqm0.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="form-section">
      <div id="user-info" class="user-badge"></div>
      
      <label>학번</label>
      <div class="sid-group">
        <select id="grade">
          <option value="" disabled selected>학년</option>
          <option value="1">1학년</option>
          <option value="2">2학년</option>
          <option value="3">3학년</option>
        </select>
        <select id="cls">
          <option value="" disabled selected>반</option>
          </select>
        <select id="num">
          <option value="" disabled selected>번호</option>
          </select>
      </div>
      
      <label>이름</label><input type="text" id="name" placeholder="성명">
      <label>문의 유형</label>
      <select id="type"><option>비밀번호 초기화</option><option>기기 문의</option><option>기타</option></select>
      <label>상세 내용</label><textarea id="detail" rows="4" placeholder="내용을 입력해주세요."></textarea>
      
      <button class="submit" id="s-btn" onclick="send()">접수하기</button>
    </div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbx0ZnLcD3JcvoAYPwhF5QfzCSQnSQb9Czb5XKs_JXtJugeuAZQT9BEf_DOVp2pctq3M/exec";
    let userEmail = "";

    // 🔥 반(1~12)과 번호(1~30) 목록을 자동으로 채워주는 코드
    window.addEventListener('DOMContentLoaded', () => {
      const clsSelect = document.getElementById('cls');
      for(let i = 1; i <= 12; i++) {
        clsSelect.innerHTML += `<option value="${i}">${i}반</option>`;
      }
      
      const numSelect = document.getElementById('num');
      for(let i = 1; i <= 30; i++) {
        numSelect.innerHTML += `<option value="${i}">${i}번</option>`;
      }
    });

    function handleCredentialResponse(r) {
      const p = JSON.parse(atob(r.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      userEmail = p.email;
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('form-section').style.display = 'block';
      document.getElementById('user-info').innerText = `인증됨: ${userEmail}`;
    }

    async function send() {
      // 선택값 가져오기
      const g = document.getElementById('grade').value;
      const c = document.getElementById('cls').value;
      const n = document.getElementById('num').value;
      const name = document.getElementById('name').value;
      const type = document.getElementById('type').value;
      const detail = document.getElementById('detail').value;

      // 선택 여부 확인
      if(!g || !c || !n) return alert("학년, 반, 번호를 모두 선택해주세요.");
      if(!name || !detail) return alert("이름과 상세 내용을 입력해주세요.");

      // 5자리 학번 자동 생성 (예: 2학년 1반 5번 -> 20105)
      const formattedSid = g + String(c).padStart(2, '0') + String(n).padStart(2, '0');

      const btn = document.getElementById('s-btn');
      btn.disabled = true; 
      btn.innerText = "접수 중...";

      try {
        await fetch(API, { 
          method: "POST", 
          body: JSON.stringify({
            studentId: formattedSid, 
            name: name,
            authEmail: userEmail,
            type: type,
            detail: detail
          })
        });
        alert("접수 완료!"); 
        location.reload();
      } catch(e) { 
        alert("오류 발생"); 
        btn.disabled = false; 
        btn.innerText = "접수하기"; 
      }
    }
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
