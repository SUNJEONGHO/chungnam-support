<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>충남고 정보부 민원접수</title>
  <style>
    :root { --main-blue: #0b3190; --bg-gray: #f5f5f7; }
    body { font-family:-apple-system, sans-serif; background: var(--bg-gray); display:flex; justify-content:center; padding:40px 20px; margin:0; }
    .card { background:#fff; padding:30px; border-radius:24px; width:100%; max-width:460px; box-shadow:0 8px 30px rgba(0,0,0,0.08); box-sizing:border-box; }
    
    .logo-container { text-align:center; margin-bottom:20px; }
    h2 { margin:10px 0; font-size:22px; color:#1d1d1f; letter-spacing: -0.5px; }
    
    label { font-size:13px; font-weight:600; color:#86868b; margin-left:5px; display:block; margin-top:18px; margin-bottom:5px; }
    input, select, textarea { width:100%; padding:14px; border-radius:12px; border:1px solid #d2d2d7; box-sizing:border-box; background:#f9f9f9; font-size:15px; outline:none; transition:0.2s; }
    input:focus, textarea:focus, select:focus { border-color:var(--main-blue); background:#fff; box-shadow: 0 0 0 4px rgba(11, 49, 144, 0.1); }

    /* ✅ 학번 선택 (가로 3칸) */
    .sid-row { display: flex; gap: 8px; }
    .sid-row select { flex: 1; text-align: center; }

    /* ✅ 이메일 아이디 + 버튼 레이아웃 */
    .email-section { display: flex; flex-direction: column; gap: 8px; }
    .email-main { display: flex; gap: 8px; }
    .email-main input { flex: 1; }
    .domain-btns { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .domain-btn { 
      background: #fff; border: 1px solid #d2d2d7; padding: 10px; border-radius: 10px; 
      font-size: 12px; cursor: pointer; transition: 0.2s; color: #1d1d1f; 
    }
    .domain-btn:hover { background: #f5f5f7; }
    .domain-btn.active { background: var(--main-blue); color: #fff; border-color: var(--main-blue); font-weight: 600; }

    .btn-submit { width:100%; padding:18px; border-radius:16px; border:none; background:var(--main-blue); color:#fff; font-weight:600; font-size:17px; cursor:pointer; transition: 0.2s; margin-top:30px; }
    .btn-submit:disabled { background:#d2d2d7; cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="card" id="form-view">
    <div class="logo-container">
      <svg width="55" viewBox="250 550 375 415"><path d="M936.955 587.936c-40.91 0-74.057 33.195-74.057 74.083 0 40.899 33.147 74.062 74.057 74.062 40.889 0 74.064-33.163 74.064-74.062 0-40.899-31.947-74.083-74.064-74.083m406.058 342.002c-.037 24.414-19.923 40.652-39.861 40.631-59.053-.06-163.436.053-245.287-.073-46.957-.06-74.071-37.963-74.071-74.061 0-27.226-.068-37.532-.068-37.532h-93.849s.046 21.991.046 37.532c0 36.088-28.396 73.858-73.979 74.001-82.087.257-197.095.092-245.924-.051-22.16-.063-39.467-18.752-39.467-40.447 0-88.718.071-309.319.071-309.319 112.87 28.443 221.721-6.344 236.769-36.565-51.573-37.083 10.333-76.007 83.231-75.978 76.53.03 138.214 44.022 169.547 108.661 10.724 22.093 102.977 67.785 236.481 36.565 0 0 .143 239.515.03 309.319" fill="#0b3190" transform="matrix(0.4605 0 0 -0.4605 -244.318 632.055)"/></svg>
      <h2>민원 접수</h2>
    </div>
    
    <label>학번 선택</label>
    <div class="sid-row">
      <select id="grade"><option value="">학년</option><option>1</option><option>2</option><option>3</option></select>
      <select id="class"><option value="">반</option></select>
      <select id="number"><option value="">번호</option></select>
    </div>
    
    <label>이름</label>
    <input type="text" id="name" placeholder="성명을 입력하세요">
    
    <label>이메일 주소</label>
    <div class="email-section">
      <div class="email-main">
        <input type="text" id="email-id" placeholder="아이디 입력">
      </div>
      <div class="domain-btns">
        <button type="button" class="domain-btn" onclick="setDomain('@chungnamhs.djsch.kr', this)">@chungnamhs.djsch.kr</button>
        <button type="button" class="domain-btn" onclick="setDomain('@gmail.com', this)">@gmail.com</button>
        <button type="button" class="domain-btn" onclick="setDomain('@naver.com', this)">@naver.com</button>
        <button type="button" class="domain-btn" onclick="setDomain('@kakao.com', this)">@kakao.com</button>
      </div>
    </div>
    
    <label>문의 유형</label>
    <select id="type">
      <option>비밀번호 초기화</option>
      <option>기기 문의</option>
      <option>기타</option>
    </select>
    
    <label>상세 내용</label>
    <textarea id="detail" placeholder="내용을 입력해 주세요."></textarea>
    
    <button class="btn-submit" id="submit-btn" onclick="submit()">접수하기</button>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycby_ZD4x4EIGEmEQA0pQVqMCpdIEjaiFlGDZXsmykVRfbYrGsgbYVT3qf1J7KMEsF6oh/exec";
    let selectedDomain = "";

    // ✅ 학번 드롭다운 자동 생성
    const classSelect = document.getElementById('class');
    const numSelect = document.getElementById('number');
    for(let i=1; i<=12; i++) classSelect.innerHTML += `<option>${i}</option>`;
    for(let i=1; i<=30; i++) numSelect.innerHTML += `<option>${String(i).padStart(2, '0')}</option>`;

    function setDomain(domain, btn) {
      selectedDomain = domain;
      document.querySelectorAll('.domain-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    async function submit() {
      const btn = document.getElementById('submit-btn');
      const g = document.getElementById('grade').value;
      const c = document.getElementById('class').value;
      const n = document.getElementById('number').value;
      const name = document.getElementById('name').value;
      const emailId = document.getElementById('email-id').value;
      const detail = document.getElementById('detail').value;

      if(!g || !c || !n || !name || !emailId || !selectedDomain || !detail) { 
        alert("모든 항목을 선택 및 입력해 주세요."); return; 
      }

      btn.disabled = true;
      btn.innerText = "접수 중...";

      const fullSid = `${g}${String(c).padStart(2, '0')}${n}`;
      const data = { 
        studentId: fullSid, 
        name: name, 
        email: emailId + selectedDomain, 
        type: document.getElementById('type').value, 
        detail: detail 
      };
      
      try {
        await fetch(API, { method:"POST", mode:"no-cors", body:JSON.stringify(data) });
        alert("접수가 완료되었습니다!");
        location.reload();
      } catch (e) {
        alert("오류 발생!");
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
