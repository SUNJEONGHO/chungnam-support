<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --apple-blue: #0071e3; --apple-bg: #f5f5f7; --apple-card: rgba(255, 255, 255, 0.8); --apple-text: #1d1d1f; --apple-subtext: #86868b; }
    body { font-family: 'Inter', sans-serif; background-color: var(--apple-bg); margin: 0; display: flex; color: var(--apple-text); -webkit-font-smoothing: antialiased; }
    .sidebar { width: 280px; background: var(--apple-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); height: 100vh; position: fixed; border-right: 1px solid rgba(0,0,0,0.05); padding: 40px 24px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
    .stats-label { font-size: 14px; font-weight: 600; color: var(--apple-subtext); }
    .stats-num { font-size: 56px; font-weight: 600; display: block; margin: 10px 0; color: var(--apple-text); }
    .main-content { margin-left: 280px; flex: 1; padding: 60px 80px; max-width: 900px; }
    h2 { font-size: 32px; font-weight: 600; margin-bottom: 40px; }
    .card { background: #ffffff; border-radius: 20px; padding: 32px; margin-bottom: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
    .name-tag { font-weight: 600; font-size: 20px; margin-bottom: 12px; }
    .content-box { font-size: 16px; line-height: 1.6; color: #424245; margin-bottom: 24px; background: #f9f9fb; padding: 15px; border-radius: 12px; }
    .quick-reply-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .quick-btn { background: #f5f5f7; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-size: 13px; font-weight: 500; }
    textarea { width: 100%; height: 100px; padding: 16px; border: 1px solid #d2d2d7; border-radius: 12px; box-sizing: border-box; font-family: inherit; margin-bottom: 16px; outline: none; }
    .submit-btn { background: var(--apple-blue); color: white; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; }
    .loader { text-align: center; padding: 100px; color: var(--apple-subtext); }
  </style>
</head>
<body>
  <div class="sidebar">
    <div>
      <div class="stats-label">TODAY'S RESOLVED</div>
      <span id="todayCount" class="stats-num">0</span>
      <div style="color: var(--apple-subtext); font-size: 14px;">건의 민원을 해결했습니다.</div>
    </div>
    <div style="font-size: 12px; color: var(--apple-subtext);">System Status: Operational</div>
  </div>

  <div class="main-content">
    <h2>민원 관리 대시보드</h2>
    <div id="list" class="loader">데이터 동기화 중...</div>
  </div>

  <script>
    // ⚠️ 본인의 구글 웹 앱 URL을 여기에 넣으세요!
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxBA_f0fJt8lzz9YuWYh9hyh9S1gZqf1XDGmdd5j9ho4bRV4SltVh6l-60EWUn72SI5/exec"; 

    window.onload = function() {
      loadData();
    };

    // 1. 데이터 불러오기 (GET 방식)
    function loadData() {
      fetch(`${GAS_URL}?mode=admin_data`)
        .then(res => res.json())
        .then(data => {
          renderList(data);
          updateStats(data);
        });
    }

    function renderList(data) {
      const listDiv = document.getElementById('list');
      if (!data || data === "EMPTY" || data.length === 0) {
        listDiv.innerHTML = "처리할 민원이 없습니다. 🎉";
        return;
      }
      listDiv.innerHTML = "";
      data.forEach((row, index) => {
        if (row[6] === "완료 ✨") return;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="name-tag">${row[1]} ${row[2]} (${row[3]})</div>
          <div class="content-box">${row[5]}</div>
          <textarea id="msg-${index}" placeholder="선생님 답변 입력..."></textarea>
          <div style="text-align: right;">
            <button class="submit-btn" onclick="send(${index}, '${row[3]}', ${index})">처리 완료</button>
          </div>
        `;
        listDiv.appendChild(card);
      });
    }

    function updateStats(data) {
      const today = new Date().toLocaleDateString();
      const count = data.filter(row => new Date(row[0]).toLocaleDateString() === today && row[6] === "완료 ✨").length;
      document.getElementById('todayCount').innerText = count;
    }

    // 2. 답변 전송 및 완료 처리 (POST 방식)
    function send(idx, studentEmail, rowIdx) {
      const msg = document.getElementById('msg-'+idx).value;
      if(!msg) return alert("답변을 입력하세요.");

      const payload = {
        action: "complete",
        rowIdx: rowIdx,
        message: msg
      };

      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(payload)
      }).then(() => {
        alert("완료 처리되었습니다.");
        location.reload();
      });
    }
  </script>
</body>
</html>
