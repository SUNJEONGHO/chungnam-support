<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>정보부 관리자</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body { font-family: sans-serif; background: #f5f5f7; padding: 20px; }
    .container { display: flex; gap: 20px; margin-top: 20px; }
    .column { flex: 1; background: #fff; padding: 20px; border-radius: 10px; min-height: 400px; }
    .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
    textarea { width: 100%; height: 60px; margin: 10px 0; }
    button { width: 100%; padding: 10px; background: #0b3190; color: #fff; border: none; cursor: pointer; border-radius: 5px; }
    .stat { background: #0b3190; color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
  </style>
</head>
<body>
  <div id="login" style="text-align:center; margin-top:100px;">
    <h2>관리자 로그인</h2>
    <div id="g_id_onload" data-client_id="461701933207-l7r5rb5iiuedj2bfabj9v73ceuc3rqm0.apps.googleusercontent.com" data-callback="handleLogin"></div>
    <div class="g_id_signin" data-type="standard"></div>
  </div>

  <div id="dash" style="display:none;">
    <div class="stat">전체: <span id="t">0</span> / 완료: <span id="d">0</span></div>
    <div class="container">
      <div class="column"><h3>⏳ 대기</h3><div id="p-list"></div></div>
      <div class="column"><h3>✅ 완료</h3><div id="c-list"></div></div>
    </div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbxYIzdvsn0N_9xjJ3b4WxT6kh3Xxox3RnorrQv9ImhyfWilEbODmLJWBkytMiu3NN3j/exec";
    const ADMINS = ["eisiseu@gmail.com", "serendipis@chungnamhs.djsch.kr", "sunj080407@gmail.com"];

    function handleLogin(r) {
      const p = JSON.parse(atob(r.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      if(ADMINS.includes(p.email)) {
        document.getElementById('login').style.display='none';
        document.getElementById('dash').style.display='block';
        load();
      } else { alert("권한 없음"); }
    }

    async function load() {
      const res = await fetch(API + "?mode=admin");
      const data = await res.json();
      document.getElementById('t').innerText = data.stats.total;
      document.getElementById('d').innerText = data.stats.done;

      const pL = document.getElementById('p-list'), cL = document.getElementById('c-list');
      pL.innerHTML = ""; cL.innerHTML = "";

      data.list.forEach(row => {
        const isDone = (row[8] === true || String(row[8]).toUpperCase() === "TRUE");
        if(isDone) {
          cL.innerHTML += `<div class="card"><strong>${row[2]}</strong><p>${row[5]}</p><small>답변: ${row[7]}</small></div>`;
        } else {
          pL.innerHTML += `<div class="card"><strong>${row[2]}</strong><p>${row[5]}</p>
            <textarea id="m-${row.sheetIndex}"></textarea>
            <button onclick="done(${row.sheetIndex}, '${row[3]}', '${row[2]}')">완료 및 전송</button></div>`;
        }
      });
    }

    async function done(idx, email, name) {
      const msg = document.getElementById(`m-${idx}`).value;
      if(!msg) return alert("답변을 쓰세요.");
      await fetch(API, { method: "POST", body: JSON.stringify({ action: "complete", rowIdx: idx, message: msg, email: email, name: name })});
      alert("처리 완료!");
      load();
    }
  </script>
</body>
</html>
