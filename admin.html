<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --apple-blue: #0071e3; --apple-bg: #f5f5f7; --apple-card: rgba(255, 255, 255, 0.8); --apple-text: #1d1d1f; --apple-subtext: #86868b; }
    body { font-family: 'Inter', sans-serif; background-color: var(--apple-bg); margin: 0; color: var(--apple-text); -webkit-font-smoothing: antialiased; }
    
    /* 로그인 화면 스타일 */
    #login-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: #ffffff; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; z-index: 1000;
    }
    .login-box { width: 100%; max-width: 320px; text-align: center; }
    .login-box h1 { font-size: 24px; font-weight: 600; margin-bottom: 30px; }
    .pw-input { 
      width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #d2d2d7; 
      background: #f5f5f7; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; text-align: center;
    }
    .pw-input:focus { border-color: var(--apple-blue); outline: none; background: #fff; }
    
    /* 대시보드 레이아웃 (기존 유지) */
    #admin-dashboard { display: none; } /* 처음엔 숨김 */
    .sidebar { width: 280px; background: var(--apple-card); backdrop-filter: blur(20px); height: 100vh; position: fixed; border-right: 1px solid rgba(0,0,0,0.05); padding: 40px 24px; box-sizing: border-box; }
    .main-content { margin-left: 280px; flex: 1; padding: 60px 80px; max-width: 900px; }
    .card { background: #ffffff; border-radius: 20px; padding: 32px; margin-bottom: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); }
    .submit-btn { background: var(--apple-blue); color: white; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
      <h1>관리자 로그인</h1>
      <input type="password" id="adminPw" class="pw-input" placeholder="비밀번호 입력" onkeypress="if(event.keyCode==13) checkPassword()">
      <button class="submit-btn" style="width: 100%;" onclick="checkPassword()">로그인</button>
      <p id="error-msg" style="color: #ff3b30; font-size: 13px; margin-top: 15px; display: none;">비밀번호가 일치하지 않습니다.</p>
    </div>
  </div>

  <div id="admin-dashboard">
    <div class="sidebar">
      <div class="stats-label" style="font-size: 14px; font-weight: 600; color: var(--apple-subtext);">TODAY'S RESOLVED</div>
      <span id="todayCount" style="font-size: 56px; font-weight: 600; display: block; margin: 10px 0;">0</span>
      <button class="submit-btn" style="background: #86868b; padding: 8px 16px; font-size: 12px;" onclick="logout()">로그아웃</button>
    </div>
    <div class="main-content">
      <h2 style="font-size: 32px; margin-bottom: 40px;">민원 관리 대시보드</h2>
      <div id="list">데이터 동기화 중...</div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzxI3Pi8CBU-fQSg-xn2uOn1XU3jvkKXOpoBGoHh-C49O5Jpq7PQd6l5eoum3E-rpC3/exec"; // ⚠️ 여기에 본인의 URL 꼭 넣으세요!
    const CORRECT_PW = "1234"; // ⚠️ 실제 사용할 비밀번호로 바꾸세요!

    // 페이지 로드 시 로그인 상태 확인
    window.onload = function() {
      if (sessionStorage.getItem("admin_logged_in") === "true") {
        showDashboard();
      }
    };

    function checkPassword() {
      const input = document.getElementById('adminPw').value;
      if (input === CORRECT_PW) {
        sessionStorage.setItem("admin_logged_in", "true");
        showDashboard();
      } else {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('adminPw').value = "";
      }
    }

    function showDashboard() {
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('admin-dashboard').style.display = 'block';
      document.body.style.display = 'flex';
      loadData();
    }

    function logout() {
      sessionStorage.clear();
      location.reload();
    }

    // 데이터 로드 로직 (기존과 동일)
    function loadData() {
      fetch(`${GAS_URL}?mode=admin_data`)
        .then(res => res.json())
        .then(data => { renderList(data); updateStats(data); });
    }

    function renderList(data) {
      const listDiv = document.getElementById('list');
      if (!data || data === "EMPTY" || data.length === 0) { listDiv.innerHTML = "모든 업무 완료! 🎉"; return; }
      listDiv.innerHTML = "";
      data.forEach((row, index) => {
        if (row[6] === "완료 ✨") return;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<div class="name-tag" style="font-weight:600; font-size:20px; margin-bottom:12px;">${row[1]} ${row[2]}</div><div style="background:#f9f9fb; padding:15px; border-radius:12px; margin-bottom:20px;">${row[5]}</div><textarea id="msg-${index}" style="width:100%; height:80px; margin-bottom:15px; border-radius:10px; border:1px solid #ddd; padding:10px;"></textarea><div style="text-align:right;"><button class="submit-btn" onclick="send(${index})">처리 완료</button></div>`;
        listDiv.appendChild(card);
      });
    }

    function updateStats(data) {
      const today = new Date().toLocaleDateString();
      const count = data.filter(row => new Date(row[0]).toLocaleDateString() === today && row[6] === "완료 ✨").length;
      document.getElementById('todayCount').innerText = count;
    }

    function send(idx) {
      const msg = document.getElementById('msg-'+idx).value;
      fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "complete", rowIdx: idx, message: msg }) })
      .then(() => { alert("완료!"); location.reload(); });
    }
  </script>
</body>
</html>
