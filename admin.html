<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정보부 관리자 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --apple-blue: #0071e3; --apple-bg: #f5f5f7; --apple-text: #1d1d1f; }
    body { font-family: 'Inter', sans-serif; background: var(--apple-bg); margin: 0; color: var(--apple-text); }
    
    /* Login Area */
    #login-screen { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 100; }
    .login-card { width: 300px; text-align: center; }
    input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d2d2d7; margin-bottom: 10px; box-sizing: border-box; text-align: center; }
    
    /* Main Area */
    #main-dashboard { display: none; padding: 40px; max-width: 800px; margin: auto; }
    .card { background: #fff; border-radius: 18px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .btn { background: var(--apple-blue); color: #fff; border: none; padding: 12px 24px; border-radius: 20px; cursor: pointer; font-weight: 600; }
    textarea { width: 100%; height: 80px; border-radius: 10px; border: 1px solid #ddd; padding: 10px; margin: 10px 0; box-sizing: border-box; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <h2>Admin Access</h2>
      <input type="password" id="pw" placeholder="비밀번호 입력">
      <button class="btn" style="width:100%" onclick="login()">로그인</button>
    </div>
  </div>

  <div id="main-dashboard">
    <div class="status-bar">
      <h1>대기 중인 민원</h1>
      <div>오늘 해결: <span id="count" style="font-weight:bold; color:var(--apple-blue);">0</span>건</div>
    </div>
    <div id="list">데이터를 불러오는 중...</div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzc8CGacXTTOJ2jjB-Sin4GHcsUHoU7UgO7c3DraAhomjcw8HA3YipwF7Qi0X8w7ZMY/exec"; // ⚠️ 수정 포인트
    const PASS = "1234";

    function login() {
      if(document.getElementById('pw').value === PASS) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        fetchData();
      } else { alert("비밀번호가 틀렸습니다."); }
    }

    async function fetchData() {
      const res = await fetch(`${API_URL}?mode=admin_data`);
      const data = await res.json();
      render(data);
    }

    function render(data) {
      const listDiv = document.getElementById('list');
      if(data === "EMPTY") { listDiv.innerHTML = "민원이 없습니다."; return; }
      
      listDiv.innerHTML = "";
      let solvedCount = 0;
      const today = new Date().toLocaleDateString();

      data.forEach((row, idx) => {
        if(row[6] === "완료 ✨") {
          if(row[0].includes(today)) solvedCount++;
          return;
        }

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div style="font-weight:600; font-size:18px;">${row[1]} ${row[2]}</div>
          <div style="margin:10px 0; color:#444;">${row[5]}</div>
          <textarea id="reply-${idx}" placeholder="학생에게 보낼 답변..."></textarea>
          <div style="text-align:right;"><button class="btn" onclick="done(${idx})">처리 완료</button></div>
        `;
        listDiv.appendChild(card);
      });
      document.getElementById('count').innerText = solvedCount;
    }

    async function done(idx) {
      const msg = document.getElementById('reply-'+idx).value;
      if(!msg) return alert("답변을 쓰세요.");
      
      await fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ action: "complete", rowIdx: idx, message: msg })
      });
      alert("완료되었습니다!");
      location.reload();
    }
  </script>
</body>
</html>
