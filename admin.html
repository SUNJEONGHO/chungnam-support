<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정보부 관리자 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    :root { --apple-blue: #0071e3; --apple-bg: #f5f5f7; --apple-text: #1d1d1f; --apple-subtext: #86868b; }
    body { font-family: 'Inter', sans-serif; background: var(--apple-bg); margin: 0; display: flex; color: var(--apple-text); }
    
    /* 🔐 로그인 화면 */
    #login-screen { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .login-card { width: 300px; text-align: center; }
    .pw-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #d2d2d7; background: #f5f5f7; margin-bottom: 12px; text-align: center; box-sizing: border-box; outline: none; }
    
    /* 👨‍🏫 사이드바 */
    #stats-panel { width: 340px; background: #ffffff; height: 100vh; position: fixed; border-right: 1px solid rgba(0,0,0,0.05); padding: 40px 24px; box-sizing: border-box; overflow-y: auto; }
    
    /* 📋 메인 컨텐츠 */
    #main-dashboard { display: none; margin-left: 340px; flex: 1; padding: 60px 50px; max-width: 800px; }
    
    .card { background: #fff; border-radius: 20px; padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); }
    .btn { background: var(--apple-blue); color: #fff; border: none; padding: 12px 24px; border-radius: 20px; cursor: pointer; font-weight: 600; }
    
    textarea { width: 100%; height: 100px; border-radius: 12px; border: 1px solid #d2d2d7; padding: 14px; margin: 12px 0; box-sizing: border-box; resize: none; font-family: inherit; }
    h3 { font-size: 15px; font-weight: 600; color: var(--apple-subtext); margin-bottom: 20px; text-transform: uppercase; }
    .chart-container { position: relative; height: 180px; margin-bottom: 30px; }
    .logo-container { text-align: center; margin-bottom: 40px; }
    
    /* ✅ 로고가 안 깨지게 만드는 핵심 스타일 */
    .cnhs-logo { width: 70px; height: auto; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-card">
      <div class="logo-container">
        <svg class="cnhs-logo" viewBox="0 0 374.155 413.138" xmlns="http://www.w3.org/2000/svg">
          <path d="M192.35 158.42c-40.91 0-74.057 33.195-74.057 74.083 0 40.899 33.147 74.062 74.057 74.062 40.889 0 74.064-33.163 74.064-74.062 0-40.888-31.947-74.083-74.064-74.083m406.058 342c-.037 24.414-19.923 40.652-39.861 40.631-59.053-.06-163.436.053-245.287-.073-46.957-.06-74.071-37.963-74.071-74.061 0-27.226-.068-37.532-.068-37.532h-93.849s.046 21.991.046 37.532c0 36.088-28.396 73.858-73.979 74.001-82.087.257-197.095.092-245.924-.051-22.16-.063-39.467-18.752-39.467-40.447 0-88.718.071-309.319.071-309.319 112.87 28.443 221.721-6.344 236.769-36.565-51.573-37.083 10.333-76.007 83.231-75.978 76.53.03 138.214 44.022 169.547 108.661 10.724 22.093 102.977 67.785 236.481 36.565 0 0 .143 239.515.03 309.319" fill="#0b3190" transform="translate(-100, -50) scale(0.4)"/>
          <path d="M812.748 1138.328s-2.324-4.184-22.048-37.39l69.107-49.023s24.877 30.374 36.822 44.697c35.718 42.829 44.497 43.168 80.222 0l36.716-44.91 69.112 49.236s-24.3 43.123-26.27 46.664c-24.829 44.354-14.059 51.66-.509 53.802 43.277 6.825 46.522 7.14 46.522 7.14v82.553s-65.235 2.582-77.18 4.097c-24.522 3.099-42.141 16.431-44.989 40.75-1.888 16.149-4.11 46.388-4.11 46.388H893.324s-2.84-38.143-4.248-46.388c-4.138-24.319-21.138-38.206-45.879-40.75-19.598-2.034-76.291-4.097-76.291-4.097v-82.553c33.185-.523 47.008-7.153 50.841-13.822 14.486-25.045 24.367-32.46 0-76.305" fill="#0b3190" transform="translate(-750, -1000) scale(0.4)"/>
        </svg>
      </div>
      <h2 style="font-size: 22px; font-weight: 600; margin-bottom: 30px;">Admin Access</h2>
      <input type="password" id="pw" class="pw-input" placeholder="비밀번호" onkeypress="if(event.keyCode==13) login()">
      <button class="btn" style="width: 100%;" onclick="login()">로그인</button>
    </div>
  </div>

  <div id="stats-panel">
    <div class="logo-container">
      <svg class="cnhs-logo" viewBox="0 0 374.155 413.138" xmlns="http://www.w3.org/2000/svg">
        <path d="M192.35 158.42c-40.91 0-74.057 33.195-74.057 74.083 0 40.899 33.147 74.062 74.057 74.062 40.889 0 74.064-33.163 74.064-74.062 0-40.888-31.947-74.083-74.064-74.083m406.058 342c-.037 24.414-19.923 40.652-39.861 40.631-59.053-.06-163.436.053-245.287-.073-46.957-.06-74.071-37.963-74.071-74.061 0-27.226-.068-37.532-.068-37.532h-93.849s.046 21.991.046 37.532c0 36.088-28.396 73.858-73.979 74.001-82.087.257-197.095.092-245.924-.051-22.16-.063-39.467-18.752-39.467-40.447 0-88.718.071-309.319.071-309.319 112.87 28.443 221.721-6.344 236.769-36.565-51.573-37.083 10.333-76.007 83.231-75.978 76.53.03 138.214 44.022 169.547 108.661 10.724 22.093 102.977 67.785 236.481 36.565 0 0 .143 239.515.03 309.319" fill="#0b3190" transform="translate(-100, -50) scale(0.4)"/>
        <path d="M812.748 1138.328s-2.324-4.184-22.048-37.39l69.107-49.023s24.877 30.374 36.822 44.697c35.718 42.829 44.497 43.168 80.222 0l36.716-44.91 69.112 49.236s-24.3 43.123-26.27 46.664c-24.829 44.354-14.059 51.66-.509 53.802 43.277 6.825 46.522 7.14 46.522 7.14v82.553s-65.235 2.582-77.18 4.097c-24.522 3.099-42.141 16.431-44.989 40.75-1.888 16.149-4.11 46.388-4.11 46.388H893.324s-2.84-38.143-4.248-46.388c-4.138-24.319-21.138-38.206-45.879-40.75-19.598-2.034-76.291-4.097-76.291-4.097v-82.553c33.185-.523 47.008-7.153 50.841-13.822 14.486-25.045 24.367-32.46 0-76.305" fill="#0b3190" transform="translate(-750, -1000) scale(0.4)"/>
      </svg>
      <h2 style="font-size: 18px; margin-top: 15px; letter-spacing: -0.02em;">CNHS INFO DEPT</h2>
    </div>
    
    <div class="card" style="box-shadow:none; border:1px solid #eee;">
      <h3>요일별 현황</h3>
      <div class="chart-container"><canvas id="dayChart"></canvas></div>
    </div>
    
    <div class="card" style="box-shadow:none; border:1px solid #eee;">
      <h3>유형별 비율</h3>
      <div class="chart-container"><canvas id="typeChart"></canvas></div>
    </div>
  </div>

  <div id="main-dashboard">
    <h1 style="font-size: 32px; font-weight: 600; margin-bottom: 40px;">대기 중인 민원</h1>
    <div id="list" style="text-align: center; padding: 100px; color: var(--apple-subtext);">동기화 중...</div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxYk2iP6VkvvHLJez3oqfeJAELThbnshHR0RvxY5R-c5x2kxNkhaTal4WVssYKI5sdu/exec"; 
    const PASS = "1234";

    let dayChartObj, typeChartObj;

    function login() {
      if(document.getElementById('pw').value === PASS) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-dashboard').style.display = 'block';
        fetchData();
      } else { alert("비밀번호가 틀렸습니다."); }
    }

    async function fetchData() {
      try {
        const res = await fetch(`${API_URL}?mode=admin_data`);
        const data = await res.json();
        renderCharts(data.dayStats, data.typeStats);
        renderList(data.list);
      } catch(e) {
        document.getElementById('list').innerText = "데이터를 불러올 수 없습니다.";
      }
    }

    function renderCharts(dayData, typeData) {
      const dCtx = document.getElementById('dayChart').getContext('2d');
      if(dayChartObj) dayChartObj.destroy();
      dayChartObj = new Chart(dCtx, {
        type: 'bar',
        data: {
          labels: ['월','화','수','목','금','토','일'],
          datasets: [{ data: ['월','화','수','목','금','토','일'].map(d => dayData[d] || 0), backgroundColor: '#0b3190', borderRadius: 4 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
      });

      const tCtx = document.getElementById('typeChart').getContext('2d');
      if(typeChartObj) typeChartObj.destroy();
      typeChartObj = new Chart(tCtx, {
        type: 'doughnut',
        data: {
          labels: Object.keys(typeData),
          datasets: [{ data: Object.values(typeData), backgroundColor: ['#0b3190', '#34c759', '#ff9f0a'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
      });
    }

    function renderList(data) {
      const listDiv = document.getElementById('list');
      if(data === "EMPTY" || !data || data.length === 0) { listDiv.innerHTML = "민원이 없습니다. 🎉"; return; }
      
      listDiv.innerHTML = "";
      data.forEach((row, idx) => {
        if(row[6] === "완료 ✨") return;
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div style="font-weight:600; font-size:18px; color:#0b3190;">${row[1]} ${row[2]} (${row[3]})</div>
          <div style="margin:12px 0; color:#424245; line-height:1.6; background:#f9f9fb; padding:15px; border-radius:10px;">${row[5]}</div>
          <textarea id="reply-${idx}" placeholder="답변을 입력하세요..."></textarea>
          <div style="text-align:right;"><button class="btn" onclick="done(${idx}, '${row[3]}', '${row[2]}')">처리 완료</button></div>
        `;
        listDiv.appendChild(card);
      });
    }

    async function done(idx, email, name) {
      const msg = document.getElementById('reply-'+idx).value;
      if(!msg) return alert("답변을 입력하세요.");
      
      await fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({ action: "complete", rowIdx: idx, message: msg, email: email, name: name })
      });
      
      alert("완료되었습니다!");
      location.reload();
    }
  </script>
</body>
</html>
