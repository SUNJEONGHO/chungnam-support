<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>충남고 정보부 민원 접수</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --apple-blue: #0b3190; --apple-bg: #ffffff; --apple-text: #1d1d1f; --apple-subtext: #86868b; --apple-input: #f5f5f7; }
    body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--apple-bg); margin: 0; color: var(--apple-text); -webkit-font-smoothing: antialiased; display: flex; justify-content: center; padding: 60px 20px; }
    
    .container { width: 100%; max-width: 440px; }
    .logo-section { text-align: center; margin-bottom: 30px; }
    h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 8px; }
    .subtitle { font-size: 17px; color: var(--apple-subtext); margin-bottom: 40px; text-align: center; line-height: 1.5; }

    .form-group { margin-bottom: 24px; }
    label { font-size: 13px; font-weight: 600; color: var(--apple-subtext); margin-left: 4px; margin-bottom: 8px; display: block; }
    
    input, select, textarea { 
      width: 100%; background: var(--apple-input); border: none; border-radius: 14px; 
      padding: 16px; font-size: 16px; color: var(--apple-text); font-family: inherit; 
      box-sizing: border-box; outline: none; transition: all 0.2s;
    }
    input:focus, select:focus, textarea:focus { background: #fff; box-shadow: 0 0 0 4px rgba(11, 49, 144, 0.1); border: 1px solid var(--apple-blue); }

    .id-row { display: flex; gap: 8px; }
    .id-row select { flex: 1; text-align: center; }

    .btn { 
      background: var(--apple-blue); color: #fff; border: none; width: 100%; 
      padding: 18px; border-radius: 16px; font-size: 17px; font-weight: 600; 
      cursor: pointer; transition: all 0.2s; margin-top: 10px;
    }
    .btn:hover { opacity: 0.9; transform: scale(0.98); }
    .btn:disabled { background: #d2d2d7; cursor: not-allowed; }

    #success-view { display: none; text-align: center; padding: 80px 0; }
    .success-icon { font-size: 50px; margin-bottom: 20px; display: block; }

    /* 로고 스타일 */
    .cnhs-logo { width: 80px; height: auto; margin-bottom: 15px; }
  </style>
</head>
<body>

  <div class="container" id="form-view">
    <div class="logo-section">
      <svg class="cnhs-logo" viewBox="250 550 375 415" xmlns="http://www.w3.org/2000/svg">
        <g transform="matrix(0.4605 0 0 -0.4605 -244.318 632.055)">
          <path d="M936.955 587.936c-40.91 0-74.057 33.195-74.057 74.083 0 40.899 33.147 74.062 74.057 74.062 40.889 0 74.064-33.163 74.064-74.062 0-40.899-31.947-74.083-74.064-74.083m406.058 342.002c-.037 24.414-19.923 40.652-39.861 40.631-59.053-.06-163.436.053-245.287-.073-46.957-.06-74.071-37.963-74.071-74.061 0-27.226-.068-37.532-.068-37.532h-93.849s.046 21.991.046 37.532c0 36.088-28.396 73.858-73.979 74.001-82.087.257-197.095.092-245.924-.051-22.16-.063-39.467-18.752-39.467-40.447 0-88.718.071-309.319.071-309.319 112.87 28.443 221.721-6.344 236.769-36.565-51.573-37.083 10.333-76.007 83.231-75.978 76.53.03 138.214 44.022 169.547 108.661 10.724 22.093 102.977 67.785 236.481 36.565 0 0 .143 239.515.03 309.319" fill="#0b3190"/>
          <path d="M812.748 1138.328s-2.324-4.184-22.048-37.39l69.107-49.023s24.877 30.374 36.822 44.697c35.718 42.829 44.497 43.168 80.222 0l36.716-44.91 69.112 49.236s-24.3 43.123-26.27 46.664c-24.829 44.354-14.059 51.66-.509 53.802 43.277 6.825 46.522 7.14 46.522 7.14v82.553s-65.235 2.582-77.18 4.097c-24.522 3.099-42.141 16.431-44.989 40.75-1.888 16.149-4.11 46.388-4.11 46.388H893.324s-2.84-38.143-4.248-46.388c-4.138-24.319-21.138-38.206-45.879-40.75-19.598-2.034-76.291-4.097-76.291-4.097v-82.553c33.185-.523 47.008-7.153 50.841-13.822 14.486-25.045 24.367-32.46 0-76.305" fill="#0b3190"/>
        </g>
      </svg>
      <h1>민원 접수</h1>
      <p class="subtitle">충남고 정보부 온라인 서비스 센터</p>
    </div>

    <div class="form-group">
      <label>학번</label>
      <div class="id-row">
        <select id="grade"></select>
        <select id="class"></select>
        <select id="number"></select>
      </div>
    </div>

    <div class="form-group">
      <label>이름</label>
      <input type="text" id="name" placeholder="성명을 입력하세요">
    </div>

    <div class="form-group">
      <label>이메일 (답변 수신용)</label>
      <input type="email" id="email" placeholder="example@chungnamhs.djsch.kr">
    </div>

    <div class="form-group">
      <label>문의 유형</label>
      <select id="type">
        <option value="비밀번호 초기화">구글 비밀번호 초기화</option>
        <option value="기기 문의">기기 및 태블릿 문의</option>
        <option value="기타">기타 문의사항</option>
      </select>
    </div>

    <div class="form-group">
      <label>상세 내용</label>
      <textarea id="detail" rows="4" placeholder="무엇을 도와드릴까요?"></textarea>
    </div>

    <button class="btn" id="submit-btn" onclick="submitForm()">민원 제출하기</button>
  </div>

  <div class="container" id="success-view">
    <span class="success-icon">✅</span>
    <h1>접수되었습니다</h1>
    <p class="subtitle">정보부에서 확인 후 입력하신 이메일로<br>답변을 보내드리겠습니다.</p>
    <button class="btn" onclick="location.reload()">새 민원 접수하기</button>
  </div>

  <script>
    // ⚠️ 본인의 구글 웹 앱 주소를 꼭 입력하세요!
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzqqKsT_qmg-NtGsvWB6hm9UuJU8BLPIDU2YJZbF3u9Slb5gBS0TAWlLwMmthWPtWM1/exec"; 

    // 학번 셀렉트박스 생성
    window.onload = function() {
      const g = document.getElementById('grade');
      const c = document.getElementById('class');
      const n = document.getElementById('number');
      for(let i=1; i<=3; i++) g.add(new Option(i+'학년', i));
      for(let i=1; i<=12; i++) c.add(new Option(i+'반', i < 10 ? '0'+i : i));
      for(let i=1; i<=35; i++) n.add(new Option(i+'번', i < 10 ? '0'+i : i));
    };

    async function submitForm() {
      const btn = document.getElementById('submit-btn');
      const data = {
        studentId: document.getElementById('grade').value + document.getElementById('class').value + document.getElementById('number').value,
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        type: document.getElementById('type').value,
        detail: document.getElementById('detail').value
      };

      if(!data.name || !data.email || !data.detail) {
        alert("모든 정보를 입력해 주세요!");
        return;
      }

      btn.disabled = true;
      btn.innerText = "제출 중...";

      try {
        await fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(data)
        });
        
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('success-view').style.display = 'block';
      } catch (e) {
        alert("제출에 실패했습니다. 다시 시도해 주세요.");
        btn.disabled = false;
        btn.innerText = "민원 제출하기";
      }
    }
  </script>
</body>
</html>
